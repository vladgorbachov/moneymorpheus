# Heap: 8G on a 8GB-RAM machine forces heavy swap and multi-hour builds (e.g. T470).
# Raise -Xmx only if the machine has plenty of free RAM (e.g. -Xmx4096m for 16GB+).
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.daemon=true
android.useAndroidX=true
