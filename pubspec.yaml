name: fluxly
description: "Fluxly — currency and crypto converter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.4
  http: ^1.6.0
  syncfusion_flutter_charts: ^33.1.44
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/logo.png
    - assets/market_logo_dark.png
    - assets/market_logo_light.jpg

  fonts:
    - family: DejaVuSans
      fonts:
        - asset: assets/fonts/dejavu-sans/ttf/DejaVuSans.ttf
        - asset: assets/fonts/dejavu-sans/ttf/DejaVuSans-Bold.ttf
          weight: 700
    - family: LARAZ
      fonts:
        - asset: assets/fonts/laraz/LARAZ Regular.ttf

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  min_sdk_android: 24
  remove_alpha_ios: true
